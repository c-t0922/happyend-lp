var SHIFT_JSON_URL = 'https://c-t0922.github.io/happyend-lp/shift.json';

function renderLineup(){
  var grid = document.getElementById('lineupGrid');
  var sub  = document.getElementById('lineupSub');
  if(!grid) return;

  // キャッシュ防止のためtimestampを付加
  fetch(SHIFT_JSON_URL + '?t=' + Date.now())
    .then(function(r){ return r.json(); })
    .then(function(data){
      // 今日の日付チェック
      var today = (function(){
        var d=new Date();
        return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
      })();

      if(!data || !data.cast || !data.cast.length || data.date !== today){
        // 本日分が未登録
        if(sub) sub.innerHTML = '';
        grid.innerHTML = '<div class="lineup-grid"><div class="ln-empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg><p>Today's lineup is being updated.<br>Contact us via LINE for current availability.</p></div></div>';
        return;
      }

      var cast = data.cast;
      if(sub){
        sub.innerHTML = '<span class="ln-live-pill"><span class="ln-dot"></span>' + cast.length + ' therapists available today</span>';
      }

      grid.innerHTML = '<div class="lineup-grid">' + cast.map(function(c){
        var rankColor = c.rank==='PREMIUM' ? '#b8986a' : c.rank==='SPECIAL' ? '#8b5cf6' : '#34c759';
        var timeStr   = (c.start && c.end) ? (c.start + ' – ' + c.end) : '';
        return '<div class="lineup-card">'
          + '<div class="lineup-photo" style="background-image:url('' + c.img + '')">'
          + '<span class="ln-rank" style="background:' + rankColor + '">' + c.rank + '</span>'
          + (timeStr
              ? '<div class="ln-time"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>' + timeStr + '</div>'
              : '')
          + '</div>'
          + '<span class="lineup-name">' + c.name + '</span>'
          + '<div class="lineup-meta">Age ' + c.age + ' · ' + c.height + 'cm (' + c.cup + ')</div>'
          + '</div>';
      }).join('') + '</div>';
    })
    .catch(function(err){
      console.warn('shift.json fetch error:', err);
      if(grid) grid.innerHTML = '';
    });
}
